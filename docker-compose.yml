services:
  db:
    image: postgres:16-alpine
    container_name: gym-sylla-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gym_sylla
      POSTGRES_USER: ${POSTGRES_USER:-gym_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gym_password_dev_only}
    ports:
      - "5432:5432"
    volumes:
      - gym_sylla_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_sylla"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gym-sylla-pgadmin
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
      echo \"db:5432:*:$${POSTGRES_USER:-gym_user}:$${POSTGRES_PASSWORD:-gym_password_dev_only}\" > /var/lib/pgadmin/pgpass &&
      chmod 600 /var/lib/pgadmin/pgpass &&
      exec /entrypoint.sh
      "

    environment:
      #PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@totalfitness.mr}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme_pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      POSTGRES_USER: ${POSTGRES_USER:-gym_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gym_password_dev_only}
    ports:
      - "5050:80"
    volumes:
      - gym_sylla_pgadmin:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin/servers.json
    depends_on:
      db:
        condition: service_healthy

volumes:
  gym_sylla_pgdata:
  gym_sylla_pgadmin:
