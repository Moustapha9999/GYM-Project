services:
  db:
    image: postgres:16-alpine
    container_name: gym-sylla-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gym_sylla
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
    ports:
      - "5432:5432"
    volumes:
      - gym_sylla_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_sylla"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gym-sylla-pgadmin
    restart: unless-stopped
    # pgpass doit être en 0600, sinon PostgreSQL refuse le mot de passe
    entrypoint: >
      /bin/sh -c "chmod 600 /pgadmin4/pgpass 2>/dev/null || true; exec /entrypoint.sh"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gym.sylla
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - gym_sylla_pgadmin:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
      - ./docker/pgadmin/pgpass:/pgadmin4/pgpass
    depends_on:
      db:
        condition: service_healthy

volumes:
  gym_sylla_pgdata:
  gym_sylla_pgadmin:
