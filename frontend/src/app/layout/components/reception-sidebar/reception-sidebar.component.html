<aside class="rec-sidebar" [class.is-open]="mobileNav.open()">
  <div class="rec-sidebar__brand">
    @if (logoUrl()) {
      <img [src]="logoUrl()!" alt="" class="rec-sidebar__logo-img" />
    } @else {
      <span class="rec-sidebar__logo-fallback" aria-hidden="true">
        <app-icon name="gym" [size]="22" />
      </span>
    }
    <strong>{{ gymName() }}</strong>
  </div>

  <p class="rec-sidebar__section">{{ 'common.menu' | translate }}</p>
  <nav class="rec-sidebar__nav">
    @for (item of menuItems(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="rec-sidebar__link"
        (click)="mobileNav.close()"
      >
        <span class="rec-sidebar__icon" aria-hidden="true">
          <app-icon [name]="item.icon" [size]="18" />
        </span>
        <span>{{ item.labelKey | translate }}</span>
        @if (item.badge) {
          <span class="rec-sidebar__badge">{{ item.badge }}</span>
        }
      </a>
    }
  </nav>

  <p class="rec-sidebar__section">{{ 'common.general' | translate }}</p>
  <nav class="rec-sidebar__nav">
    <button type="button" class="rec-sidebar__link rec-sidebar__link--btn" (click)="logout()">
      <span class="rec-sidebar__icon" aria-hidden="true">
        <app-icon name="log-out" [size]="18" />
      </span>
      <span>{{ 'common.logout' | translate }}</span>
    </button>
  </nav>

  <div class="rec-sidebar__footer">
    <small>{{ userName() }}</small>
    <span>{{ roleLabelKey() | translate }}</span>
  </div>
</aside>
